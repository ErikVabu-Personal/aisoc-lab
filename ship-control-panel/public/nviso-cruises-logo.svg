<svg viewBox="0 0 360 84" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NVISO Cruises">
  <!-- "nviso" wordmark — lowercase, dark grey, exactly as the official mark. -->
  <text x="4" y="56"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800" font-size="58" fill="#3a3a3a" letter-spacing="-0.04em">nviso</text>

  <!-- "CRUISES" subtitle — tracked-out cyan beneath the wordmark. -->
  <text x="6" y="78"
        font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-weight="700" font-size="12" fill="#0099CC" letter-spacing="0.45em">CRUISES</text>

  <!--
    Geometric cruise ship — same origami / triangulated shading style
    as the NVISO bird mark, swapped for a ship to make the "cruises"
    theme literal. Five blue tones echo the bird's facets.
  -->
  <g transform="translate(228, 4)">
    <!-- Smokestack -->
    <polygon points="34,8 46,8 48,22 32,22" fill="#7DD9F2"/>
    <!-- Top deck (roof) -->
    <polygon points="22,22 60,22 56,32 26,32" fill="#33B0DD"/>
    <!-- Main cabin / mid deck -->
    <polygon points="14,32 70,32 66,44 18,44" fill="#0099CC"/>
    <!-- Hull body -->
    <polygon points="6,44 80,44 84,56 2,56" fill="#0F6BAA"/>
    <!-- Hull bottom (curved trapezoid) -->
    <polygon points="2,56 84,56 76,68 10,68" fill="#0E5C8C"/>
    <!-- Wave line beneath the hull -->
    <path d="M-4 74 Q 6 70 16 74 T 36 74 T 56 74 T 76 74 T 90 74"
          stroke="#33B0DD" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
