name: Build + Publish Ship Control Panel (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ship-control-panel/**'
      - '.github/workflows/deploy-ship-control-panel.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # OIDC: GitHub mints a JWT for azure/login

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Ship Control Panel
        uses: docker/build-push-action@v6
        with:
          context: ./ship-control-panel
          push: true
          tags: |
            ghcr.io/erikvabu-personal/aisoc-ship-control-panel:latest
            ghcr.io/erikvabu-personal/aisoc-ship-control-panel:${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Force Container App to pull new image
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AISOC_RESOURCE_GROUP }}"
          NAME="${{ vars.AISOC_SHIP_CONTROL_PANEL_NAME }}"
          if [[ -z "$RG" || -z "$NAME" ]]; then
            echo "::warning::AISOC_RESOURCE_GROUP or AISOC_SHIP_CONTROL_PANEL_NAME repo variable not set; skipping force-roll"
            exit 0
          fi
          IMAGE="ghcr.io/erikvabu-personal/aisoc-ship-control-panel:${{ github.sha }}"
          echo "Updating $NAME (RG: $RG) to $IMAGE"
          az containerapp update \
            --resource-group "$RG" \
            --name "$NAME" \
            --image "$IMAGE" >/dev/null
          echo "OK: ship-control-panel Container App updated."
