name: Deploy AISOC Orchestrator Function

on:
  workflow_dispatch:
    inputs:
      function_app_name:
        description: "Override Azure Function App name (defaults to vars.AISOC_ORCHESTRATOR_FUNCTION_NAME)"
        required: false
      resource_group:
        description: "Override resource group name (defaults to vars.AISOC_RESOURCE_GROUP)"
        required: false
  push:
    branches: [ main ]
    paths:
      - 'terraform/2-deploy-aisoc/orchestrator/function_app/**'
      - '.github/workflows/deploy-aisoc-orchestrator.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC: GitHub mints a JWT for azure/login

    env:
      RG: ${{ inputs.resource_group || vars.AISOC_RESOURCE_GROUP }}
      FUNCTION_APP_NAME: ${{ inputs.function_app_name || vars.AISOC_ORCHESTRATOR_FUNCTION_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RG" || -z "$FUNCTION_APP_NAME" ]]; then
            echo "::error::AISOC_RESOURCE_GROUP and AISOC_ORCHESTRATOR_FUNCTION_NAME must be set as repo variables (or passed as workflow_dispatch inputs)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build function package (with dependencies)
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/2-deploy-aisoc/orchestrator/function_app

          python -m pip install --upgrade pip
          rm -rf .python_packages function_app.zip

          python -m pip install --no-cache-dir --target ".python_packages/lib/site-packages" -r requirements.txt

          python - <<'PY'
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path('.python_packages/lib/site-packages').resolve()))
          import requests  # noqa
          import azure.functions  # noqa
          import azure.identity  # noqa
          print('deps_ok')
          PY

          zip -r function_app.zip host.json requirements.txt AISOCOrchestrator shared .python_packages

      - name: Deploy zip to Function App
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/2-deploy-aisoc/orchestrator/function_app
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$FUNCTION_APP_NAME" \
            --src function_app.zip
