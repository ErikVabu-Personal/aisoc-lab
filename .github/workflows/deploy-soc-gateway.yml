name: Deploy SOC Gateway Function

on:
  workflow_dispatch:
    inputs:
      function_app_name:
        description: "Override Azure Function App name (defaults to vars.AISOC_SOC_GATEWAY_FUNCTION_NAME)"
        required: false
      resource_group:
        description: "Override resource group name (defaults to vars.AISOC_RESOURCE_GROUP)"
        required: false
  push:
    branches: [ main ]
    paths:
      - 'terraform/2-deploy-aisoc/foundry/function_app/**'
      - '.github/workflows/deploy-soc-gateway.yml'
      - 'terraform/2-deploy-aisoc/scripts/configure_runner_socgateway_key.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RG: ${{ inputs.resource_group || vars.AISOC_RESOURCE_GROUP }}
      FUNCTION_APP_NAME: ${{ inputs.function_app_name || vars.AISOC_SOC_GATEWAY_FUNCTION_NAME }}
      RUNNER_NAME: ${{ vars.AISOC_RUNNER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RG" || -z "$FUNCTION_APP_NAME" ]]; then
            echo "::error::AISOC_RESOURCE_GROUP and AISOC_SOC_GATEWAY_FUNCTION_NAME must be set as repo variables (or passed as workflow_dispatch inputs)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build function package (with dependencies)
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/2-deploy-aisoc/foundry/function_app

          python -m pip install --upgrade pip
          rm -rf .python_packages function_app.zip

          python -m pip install --no-cache-dir --target ".python_packages/lib/site-packages" -r requirements.txt

          python - <<'PY'
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path('.python_packages/lib/site-packages').resolve()))
          import requests  # noqa: F401
          import azure.functions  # noqa: F401
          print('deps_ok')
          PY

          zip -r function_app.zip host.json requirements.txt SOCGateway shared .python_packages

      - name: Deploy zip to Function App
        shell: bash
        run: |
          set -euo pipefail
          cd terraform/2-deploy-aisoc/foundry/function_app
          az functionapp deployment source config-zip \
            --resource-group "$RG" \
            --name "$FUNCTION_APP_NAME" \
            --src function_app.zip

      - name: Re-wire runner with fresh SOCGateway function key
        # A function-code redeploy can rotate the function key, leaving the
        # runner's SOCGATEWAY_FUNCTION_CODE stale. Re-fetch + re-set so the
        # runner is immediately functional after every gateway deploy.
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RUNNER_NAME" ]]; then
            echo "::warning::AISOC_RUNNER_NAME repo variable not set; skipping runner re-wire"
            exit 0
          fi
          export RG FUNC_APP="$FUNCTION_APP_NAME" RUNNER_NAME
          terraform/2-deploy-aisoc/scripts/configure_runner_socgateway_key.sh
