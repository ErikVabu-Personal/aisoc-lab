name: Build + Publish AISOC Runner (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'runner/**'
      - '.github/workflows/deploy-aisoc-runner.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # OIDC: GitHub mints a JWT for azure/login

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: ./runner
          push: true
          tags: |
            ghcr.io/erikvabu-personal/aisoc-runner:latest
            ghcr.io/erikvabu-personal/aisoc-runner:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Force Container App to pull new image
        # Container Apps cache the digest behind :latest, so re-pushing
        # alone won't roll a new revision. Setting --image with the
        # SHA-tagged ref creates a new revision that pulls.
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AISOC_RESOURCE_GROUP }}"
          NAME="${{ vars.AISOC_RUNNER_NAME }}"
          if [[ -z "$RG" || -z "$NAME" ]]; then
            echo "::warning::AISOC_RESOURCE_GROUP or AISOC_RUNNER_NAME repo variable not set; skipping force-roll"
            exit 0
          fi
          IMAGE="ghcr.io/erikvabu-personal/aisoc-runner:${{ github.sha }}"
          echo "Updating $NAME (RG: $RG) to $IMAGE"
          az containerapp update \
            --resource-group "$RG" \
            --name "$NAME" \
            --image "$IMAGE" >/dev/null
          echo "OK: runner Container App updated."
