name: Build + Publish AISOC Runner (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'runner/**'
      - '.github/workflows/deploy-aisoc-runner.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./runner
          push: true
          tags: |
            ghcr.io/erikvabu-personal/aisoc-runner:latest
            ghcr.io/erikvabu-personal/aisoc-runner:${{ github.sha }}

  build_pixelagents_web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PixelAgents Web
        uses: docker/build-push-action@v6
        with:
          context: ./pixelagents_web
          push: true
          tags: |
            ghcr.io/erikvabu-personal/aisoc-lab-pixelagents-web:latest
            ghcr.io/erikvabu-personal/aisoc-lab-pixelagents-web:${{ github.sha }}
