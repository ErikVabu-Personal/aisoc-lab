name: Build + Publish PixelAgents Web (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pixelagents_web/**'
      - '.github/workflows/deploy-pixelagents-web.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PixelAgents Web
        uses: docker/build-push-action@v6
        with:
          context: ./pixelagents_web
          push: true
          tags: |
            ghcr.io/erikvabu-personal/aisoc-lab-pixelagents-web:latest
            ghcr.io/erikvabu-personal/aisoc-lab-pixelagents-web:${{ github.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Force Container App to pull new image
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.AISOC_RESOURCE_GROUP }}"
          NAME="${{ vars.AISOC_PIXELAGENTS_NAME }}"
          if [[ -z "$RG" || -z "$NAME" ]]; then
            echo "::warning::AISOC_RESOURCE_GROUP or AISOC_PIXELAGENTS_NAME repo variable not set; skipping force-roll"
            exit 0
          fi
          IMAGE="ghcr.io/erikvabu-personal/aisoc-lab-pixelagents-web:${{ github.sha }}"
          echo "Updating $NAME (RG: $RG) to $IMAGE"
          az containerapp update \
            --resource-group "$RG" \
            --name "$NAME" \
            --image "$IMAGE" >/dev/null
          echo "OK: pixelagents_web Container App updated."
